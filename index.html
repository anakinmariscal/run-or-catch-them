<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run or Catch them!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        .gallery-img { cursor: pointer; transition: transform .2s ease; }
        .gallery-img:hover { transform: scale(1.02); }
        #imageModal { position: fixed; inset: 0; z-index: 1050; background-color: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; }
        #imageModal.open { display: flex; }
        #imageModal .modal-content { position: relative; max-width: 90vw; max-height: 90vh; }
        #imageModal img { max-width: 100%; max-height: 80vh; border-radius: 6px; }
        #imageModal .close-btn, #imageModal .nav-btn { position: absolute; color: white; background: rgba(0,0,0,0.45); border: 0; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #imageModal .close-btn { top: 10px; right: 10px; }
        #imageModal .nav-btn { top: 50%; transform: translateY(-50%); }
        #imageModal .prev-btn { left: 10px; }
        #imageModal .next-btn { right: 10px; }
    </style>
</head>
<body>
    <h1>
        BOG: Run or Catch them!
    </h1>
    <!-- Aqui van los progresos e imagenes 😏-->
    <h2>
        Mapa 🗺
    </h2>
    <div class="row mb-3 justify-content-center">
        <div class="col-6 col-md-3 mb-2">
            <img src="img/progreso_de_mapa.PNG" class="img-fluid rounded gallery-img" data-index="0" alt="Progreso de Mapa">
        </div>
        <div class="col-6 col-md-3 mb-2">
            <img src="img/progreso_de_mapa_2.png" class="img-fluid rounded gallery-img" data-index="1" alt="Progreso de Mapa 2">
        </div>
    </div>
    <div class="progress">
        <div class="progress-bar bg-warning" role="progressbar" aria-label="Mapa" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <hr>

    <h2>
        Mecánicas 🔧
    </h2>
    <div class="progress" role="progressbar" aria-label="Mecánicas" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar bg-success" style="width: 100%"></div> 
    </div>

     <hr>

    <h2>
        Gráficos ⛅
    </h2>
    <div class="progress" role="progressbar" aria-label="Gráficos" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar bg-warning" style="width: 80%"></div>
    </div>



    <div id="imageModal" role="dialog" aria-modal="true" aria-label="Galería de imágenes">
        <div class="modal-content text-center">
            <button class="close-btn" aria-label="Cerrar galería">×</button>
            <button class="nav-btn prev-btn" aria-label="Imagen anterior">‹</button>
            <img id="modalImage" src="" alt="" />
            <button class="nav-btn next-btn" aria-label="Imagen siguiente">›</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script>
        const galleryImgs = Array.from(document.querySelectorAll('.gallery-img'));
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const closeBtn = modal.querySelector('.close-btn');
        const prevBtn = modal.querySelector('.prev-btn');
        const nextBtn = modal.querySelector('.next-btn');
        let currentIndex = 0;

        function openModal(index) {
            currentIndex = index;
            const img = galleryImgs[currentIndex];
            modalImage.src = img.src;
            modalImage.alt = img.alt;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + galleryImgs.length) % galleryImgs.length;
            openModal(currentIndex);
        }

        function showNext() {
            currentIndex = (currentIndex + 1) % galleryImgs.length;
            openModal(currentIndex);
        }

        galleryImgs.forEach((img, i) => {
            img.addEventListener('click', () => openModal(i));
        });

        closeBtn.addEventListener('click', closeModal);
        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('open')) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') showPrev();
            if (e.key === 'ArrowRight') showNext();
        });
    </script>
</body>
</html>
